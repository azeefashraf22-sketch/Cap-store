<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | CapStore</title>
    <link rel="icon" type="jpeg" href="./images-removebg-preview.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <nav>
        <div class="logo">
            <i class="fas fa-hat-cowboy"></i> CAP<span>STORE</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="admin-card">
            <div class="admin-header">
                <h2>Contact Us</h2>
                <p>Send us a message and we'll get back to you</p>
            </div>

            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="c-name" placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="c-email" placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label>Your Message</label>
                <textarea id="c-msg" placeholder="How can we help you?" style="width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; height: 100px; font-family: inherit;"></textarea>
            </div>

            <button id="send-msg-btn" class="buy-btn">Send Message</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
