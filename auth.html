<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup | CapStore</title>
    <link rel="icon" type="jpeg" href="./images-removebg-preview.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <nav>
        <div class="logo">
            <i class="fas fa-hat-cowboy"></i> CAP<span>STORE</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Back Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="admin-card">

            <div class="admin-header">
                <h2 id="auth-title">Login</h2>
                <p id="auth-subtitle">Access your account to explore premium caps.</p>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button id="main-btn" class="buy-btn" style="margin-top: 10px;">Login Now</button>

            <div class="divider"><span>OR</span></div>

            <button id="google-btn" class="google-btn">
               <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Continue with Google
            </button>

            <p style="margin-top: 25px; text-align: center; font-size: 14px; color: #666;">
                <span id="toggle-msg">Don't have an account?</span>
                <span onclick="toggleAuth()" id="toggle-text" style="color: var(--accent); cursor: pointer; font-weight: 600;">Sign Up</span>
            </p>
        </div>
    </div>

    <script>
        function toggleAuth() {
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const btn = document.getElementById('main-btn');
            const toggleText = document.getElementById('toggle-text');
            const toggleMsg = document.getElementById('toggle-msg');

            if (title.innerText === "Login") {
                title.innerText = "Sign Up";
                subtitle.innerText = "Create a new account to start shopping.";
                btn.innerText = "Register Now";
                toggleMsg.innerText = "Already have an account?";
                toggleText.innerText = "Login";
            } else {
                title.innerText = "Login";
                subtitle.innerText = "Access your account to explore premium caps.";
                btn.innerText = "Login Now";
                toggleMsg.innerText = "Don't have an account?";
                toggleText.innerText = "Sign Up";
            }
        }
    </script>

    <script type="module" src="app.js"></script>
</body>
</html>
